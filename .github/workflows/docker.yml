name: Build & Push Docker

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Extract version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/app:${{ steps.vars.outputs.VERSION }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/app:latest .

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/app:${{ steps.vars.outputs.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/app:latest